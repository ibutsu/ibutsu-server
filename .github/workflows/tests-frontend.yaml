name: Ibutsu frontend tests

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/tests-frontend.yaml'
      - 'codecov.yml'
  pull_request:
    types: ["opened", "synchronize", "reopened"]
    paths:
      - 'frontend/**'
      - '.github/workflows/tests-frontend.yaml'
      - 'codecov.yml'

jobs:
  lint-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: 'frontend/.nvmrc'
      - run: corepack enable
      - run: yarn install --immutable
        working-directory: ./frontend
      - run: yarn lint
        working-directory: ./frontend
      - name: Run tests with coverage
        run: yarn test:coverage:ci
        working-directory: ./frontend
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30

  upload-coverage:
    runs-on: ubuntu-latest
    needs: lint-test-frontend
    if: needs['lint-test-frontend'].result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-reports
          pattern: '*-coverage*'
      - name: Display structure of downloaded files
        run: ls -R coverage-reports
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage-reports
          name: codecov-umbrella
          fail_ci_if_error: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          verbose: true
